name = "my-office-backend"
main = "src/index.ts"
compatibility_date = "2024-05-07"
workers_dev = true

# Custom Domain
routes = [
  { pattern = "api.capt-th.work", custom_domain = true }
]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "my-office-db"
database_id = "58e17566-ef62-41ab-a585-0ca7b34e2016"

# R2 Storage Binding (for uploads)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "my-office-uploads"

[vars]
# Add other environment variables here
# ADMIN_API_KEY = "..."
